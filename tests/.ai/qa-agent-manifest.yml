repo:
  purpose: "Playwright TypeScript E2E QA framework for the aisle-checker demo monorepo (React SPA + Spring Boot API)."
  framework: "Playwright Test"
  language: "TypeScript"
  target_site: "http://localhost:5173"
  target_site_ci: "http://localhost:4173"
  notes:
    - "The React SPA uses HashRouter — all routes are prefixed with /#/ (e.g. /#/products/1, /#/stores)."
    - "The API runs on http://localhost:8080. In CI, the SPA is built with VITE_API_BASE_URL=http://localhost:8080 and served via vite preview on port 4173."
    - "testIdAttribute is configured to data-test. Use getByTestId('foo') not [data-test='foo']."

commands:
  working_directory: "tests/e2e"
  install_dependencies: "npm install"
  install_chromium: "npx playwright install chromium"
  run_all_tests: "npm test"
  run_headed: "npm run test:headed"
  run_ui: "npm run test:ui"
  run_debug: "npm run test:debug"
  show_report: "npm run test:report"
  typecheck: "npm run typecheck"
  lint_anti_patterns: "npm run lint:anti-patterns"
  validate_test_inventory: "npm run validate:inventory"
  prepare_ci_agent_handoff: "npm run agent:ci:prepare"

folder_structure:
  tests: "Feature-based Playwright specs under tests/e2e/tests/<feature>/."
  src_pages: "Page objects with user-level actions and page-specific locators under tests/e2e/src/pages/."
  src_fixtures: "Shared Playwright fixture setup under tests/e2e/src/fixtures/."
  src_test_data: "Typed test data constants under tests/e2e/src/test-data/."
  src_helpers: "Shared helpers such as testTags under tests/e2e/src/helpers/."
  scripts: "Utility scripts (anti-pattern linter, inventory validator) under tests/e2e/scripts/."
  agent_artifacts: "Planner and writer CI handoff artifacts under tests/e2e/agent-artifacts/."

test_conventions:
  - "Import test and expect from src/fixtures/base."
  - "Group specs by feature folder under tests/ (products/, product-detail/, stores/)."
  - "Use page objects for page actions and page-specific locators."
  - "Keep assertions in specs unless a page-level assertion helper improves readability."
  - "Search existing tests before creating new tests."
  - "Run targeted tests after changes."
  - "Update .ai/test-inventory.yml when adding, removing, or renaming tests."
  - "Each distinct user journey lives in its own spec file."
  - "Use typed test data from src/test-data/products.ts; do not redeclare product shapes per-page."
  - "Test IDs follow the pattern PROD-NNN, DETAIL-NNN, STORE-NNN."
  - "Test plans must enumerate test cases as TC01, TC02, ... using the schema in prompts/qa-test-planner.md."
  - "Agents must scan their generated diff for AP-001..AP-006 before reporting done. Any hit is a hard failure of the writer step."

anti_patterns:
  - id: "AP-001"
    name: "Hardcoded sleeps"
    rationale: "page.waitForTimeout creates flake-friendly fixed waits and hides real timing bugs."
    forbidden_pattern: "any call to waitForTimeout in src/** or tests/**"
    allowed_alternative: "Use expect(...).toHave...({ timeout }) for state, expect.poll(fn, { timeout }) for derived state, page.waitForLoadState/waitForURL/waitForResponse for navigation/network, locator.waitFor() only when no assertion fits."
    scope: "src/**, tests/**"
  - id: "AP-002"
    name: "Try/catch with page.reload as flake mitigation"
    rationale: "Reload-on-flake hides product bugs and creates false greens. If refresh is part of the user flow, do it deterministically and document why."
    forbidden_pattern: "try { await expect(...) ... } catch { ... page.reload() ... } pattern; or any catch block that calls page.reload(), page.goto(), or retries an assertion."
    allowed_alternative: "Use expect.poll, increase the assertion timeout, or — if reload is part of the spec'd user flow — call it unconditionally with a comment explaining why."
    scope: "src/**, tests/**"
  - id: "AP-003"
    name: "Raw CSS/id selectors when a data-test attribute exists"
    rationale: "testIdAttribute is configured to data-test. Using #id or .class hardcodes DOM structure. All key aisle-checker elements have data-test attributes."
    forbidden_pattern: "page.locator('#...'), page.locator('.foo'), page.locator('[data-test=...]') in spec files; raw # or . selectors in page objects when a data-test attribute is documented for the same element."
    allowed_alternative: "page.getByTestId('product-card'), page.getByTestId('availability-badge'), page.getByRole(...), etc. Consult the data-test lookup table in .agents/skills/playwright-cli/SKILL.md."
    scope: "src/pages/**, tests/**"
  - id: "AP-004"
    name: "Cross-cutting concerns inside an assertion helper"
    rationale: "A method named expectCardShowsPrice must assert exactly the price. Sneaking an availability check inside makes the helper unreusable."
    forbidden_pattern: "expectX helper that asserts a fact unrelated to X."
    allowed_alternative: "Compose multiple expect calls in the spec, or split into named helpers (expectCardShowsPrice + expectCardShowsAvailability)."
    scope: "src/pages/**"
  - id: "AP-005"
    name: "Anti-patterns hidden inside page objects"
    rationale: "If a workaround must exist, it should be visible in the spec so reviewers can challenge it. POM-buried hacks pollute every future test."
    forbidden_pattern: "Any of AP-001..AP-004 occurring inside a method on src/pages/**."
    allowed_alternative: "If a workaround is genuinely required and approved, place it in the spec with an inline comment citing the bug ID. Page objects must encode the user-level action only."
    scope: "src/pages/**"
  - id: "AP-006"
    name: "Implicit-only negative assertions"
    rationale: "Asserting only count-equals-N misses bugs where count is right but contents are wrong. Always pair count with at least one named negative when a specific item must be absent."
    forbidden_pattern: "Flow that asserts only expectStoreProductCount(N) without also asserting a specific product is absent when exclusion is the intent of the test."
    allowed_alternative: "expectStoreProductCount(N) + expectStoreProductNotVisible(excludedName)."
    scope: "tests/**"

locator_strategy:
  preferred_order:
    - "getByRole"
    - "getByLabel"
    - "getByPlaceholder"
    - "getByText"
    - "getByTestId"
    - "short CSS only when no better option exists"
  notes:
    - "All pages must use the modern locator API. Raw [data-test='...'] CSS is forbidden because testIdAttribute is configured."
    - "Availability badge status must be asserted via data-status attribute, not text: expect(badge).toHaveAttribute('data-status', 'in_stock')."
  avoid:
    - "XPath"
    - "nth-child"
    - "long CSS selectors"
    - "class-only selectors"
    - "waitForTimeout"

page_object_rules:
  - "Expose meaningful user and business actions."
  - "Declare stable page-specific locators as readonly Locator properties and initialize them in the constructor."
  - "Use those locator properties inside page actions and page-level assertions instead of repeating inline locator expressions."
  - "Keep dynamic or parameterized locators, such as product cards filtered by name, as small private helper methods."
  - "Do not mirror every locator as a method."
  - "Keep raw locators out of specs unless there is a clear documented reason."
  - "Update only the page object responsible for the changed page."
  - "Prefer small, readable methods over broad helper abstractions."

fixture_rules:
  - "Specs must import from src/fixtures/base."
  - "Add shared page objects to the base fixture when they are used by multiple tests."
  - "The base fixture provides productsPage, productDetailPage, and storesPage."
  - "Do not create feature-specific fixture layers unless repetition becomes meaningful."
  - "No authentication is required — aisle-checker has no login page."

patterns_to_avoid:
  - pattern: "Distinct journeys sharing one spec file."
    explanation: "Separate journey files keep inventory metadata, targeted runs, and reviews precise."
  - pattern: "Text-matching availability badges."
    explanation: "Assert availability via data-status attribute (in_stock, low_stock, out_of_stock) rather than badge text. The badge renders 'In Stock', 'Low Stock', 'Out of Stock' but the data-status value is the stable contract."
  - pattern: "Raw [data-test='...'] CSS locators."
    explanation: "Use getByTestId because Playwright is configured with testIdAttribute: data-test."
  - pattern: "waitForTimeout."
    explanation: "Arbitrary sleeps hide timing problems and make tests slower and flakier."
  - pattern: "Hardcoded product counts in expectLoaded helpers."
    explanation: "expectLoaded should assert the list container is visible, not that exactly N products are present. Product counts belong in dedicated count assertions."

guardrails:
  - "Do not hardcode product or store IDs in tests — use named constants from src/test-data/products.ts."
  - "Use page objects for all interactions."
  - "Do not add secrets, tokens, or production data."
  - "Do not weaken assertions only to make a test pass."
  - "Do not add arbitrary waits."
  - "Do not add CI job changes unless explicitly requested."
  - "Never navigate directly to /products/:id using a raw URL — use productDetailPage.goto(product.id)."

agent_read_order_before_test_changes:
  - ".ai/qa-agent-manifest.yml"
  - ".ai/page-object-registry.yml"
  - ".ai/test-inventory.yml"
  - ".ai/test-data-catalog.yml"
  - ".ai/feature-map.yml"
  - ".ai/ci-agent-sequence.yml"

ci_agent_sequence:
  supported: true
  sequence_file: ".ai/ci-agent-sequence.yml"
  workflow_template: ".github/workflows/agentic-qa-sequence.yml"
  artifact_root: "agent-artifacts"
  planner_output: "agent-artifacts/plans/test-plan.md"
  writer_summary: "agent-artifacts/writer/change-summary.md"
  notes:
    - "CI must provide an actual agent runner such as Codex CLI, an LLM API wrapper, or another approved automation runner."
    - "Planner writes the test plan artifact before Writer starts."
    - "Writer reads the planner artifact and repo metadata before editing code."
    - "Writer may use Playwright CLI in CI only for explicit headless, non-interactive inspection commands."
    - "Writer must not pass --headed, run npm run test:headed, or use any headed browser workflow in CI."
    - "Writer records unresolved locator or flow questions when CI cannot derive them from metadata, existing code, or headless inspection."
    - "Writer does not run Playwright codegen in the CI sequence."
