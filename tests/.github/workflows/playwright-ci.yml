name: Playwright E2E CI

on:
  pull_request:
    paths:
      - "tests/e2e/.ai/**"
      - "tests/e2e/.github/workflows/**"
      - "tests/e2e/oracle-phase0/**"
      - "tests/e2e/package-lock.json"
      - "tests/e2e/package.json"
      - "tests/e2e/playwright.config.ts"
      - "tests/e2e/scripts/**"
      - "tests/e2e/src/**"
      - "tests/e2e/tests/**"
      - "tests/e2e/tsconfig.json"
      - "apps/aisle-ui/**"
      - "apps/aisle-api/src/**"
  push:
    branches:
      - main
      - master
    paths:
      - "tests/e2e/.ai/**"
      - "tests/e2e/.github/workflows/**"
      - "tests/e2e/oracle-phase0/**"
      - "tests/e2e/package-lock.json"
      - "tests/e2e/package.json"
      - "tests/e2e/playwright.config.ts"
      - "tests/e2e/scripts/**"
      - "tests/e2e/src/**"
      - "tests/e2e/tests/**"
      - "tests/e2e/tsconfig.json"
      - "apps/aisle-ui/**"
      - "apps/aisle-api/src/**"

permissions:
  contents: read

jobs:
  e2e:
    name: Typecheck and Playwright E2E tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build and start API
        working-directory: apps/aisle-api
        run: |
          mvn -q package -DskipTests
          java -jar target/*.jar &
          echo "Waiting for API..."
          for i in $(seq 1 30); do
            curl -sf http://localhost:8080/api/products > /dev/null && echo "API ready" && break
            sleep 2
          done

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build React UI
        working-directory: apps/aisle-ui
        run: |
          npm ci
          VITE_API_BASE_URL=http://localhost:8080 npm run build

      - name: Serve UI via vite preview
        working-directory: apps/aisle-ui
        run: |
          npx vite preview --port 4173 &
          echo "Waiting for UI..."
          for i in $(seq 1 20); do
            curl -sf http://localhost:4173 > /dev/null && echo "UI ready" && break
            sleep 2
          done

      - name: Install E2E dependencies
        working-directory: tests/e2e
        run: npm ci

      - name: Get Playwright version
        id: playwright-version
        working-directory: tests/e2e
        run: echo "version=$(node -p \"require('./package-lock.json').packages['node_modules/@playwright/test'].version\")" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-ms-playwright-${{ steps.playwright-version.outputs.version }}

      - name: Install Chromium
        working-directory: tests/e2e
        run: npx playwright install chromium

      - name: Typecheck
        working-directory: tests/e2e
        run: npm run typecheck

      - name: Lint anti-patterns
        working-directory: tests/e2e
        run: npm run lint:anti-patterns

      - name: Validate test inventory
        working-directory: tests/e2e
        run: npm run validate:inventory

      - name: Run Playwright suite
        working-directory: tests/e2e
        env:
          BASE_URL: http://localhost:4173
        run: npm test || true

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: tests/e2e/playwright-report
          if-no-files-found: ignore

      - name: Upload JUnit results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results
          path: tests/e2e/playwright-results
          if-no-files-found: ignore
