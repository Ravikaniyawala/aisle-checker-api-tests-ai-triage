name: Aisle Checker Pipeline

on:
  push:
    branches: ['**']

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  # Stage 1: Build
  build:
    name: Build API
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build API (skip tests)
        run: mvn package -DskipTests -q
        working-directory: apps/aisle-api

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: aisle-api-jar
          path: apps/aisle-api/target/*.jar
          retention-days: 1

  # Stage 2: API Tests
  api-tests:
    name: REST Assured API Tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Download JAR
        uses: actions/download-artifact@v4
        with:
          name: aisle-api-jar
          path: apps/aisle-api/target/

      - name: Start API server
        run: |
          java -jar apps/aisle-api/target/*.jar &
          echo "Waiting for API to be ready..."
          for i in {1..30}; do
            curl -sf http://localhost:8080/api/products && echo "API ready" && break
            sleep 2
          done

      - name: Run REST Assured tests
        # || true — let all tests run even if some fail, Oracle handles triage
        run: mvn test -Dapi.base.url=http://localhost:8080 -q || true
        working-directory: tests/api

      - name: Collect surefire reports
        if: always()
        run: |
          mkdir -p test-results
          cp tests/api/target/surefire-reports/*.xml test-results/ 2>/dev/null || true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/
          retention-days: 7

  # Stage 2b: Playwright E2E Tests (parallel with api-tests)
  e2e-tests:
    name: Playwright E2E Tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Download JAR
        uses: actions/download-artifact@v4
        with:
          name: aisle-api-jar
          path: apps/aisle-api/target/

      - name: Start API server
        run: |
          java -jar apps/aisle-api/target/*.jar &
          echo "Waiting for API to be ready..."
          for i in {1..30}; do
            curl -sf http://localhost:8080/api/products && echo "API ready" && break
            sleep 2
          done

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            apps/aisle-ui/package.json
            tests/e2e/package.json

      - name: Build React UI
        working-directory: apps/aisle-ui
        run: npm ci && npm run build
        env:
          VITE_API_BASE_URL: http://localhost:8080

      - name: Serve React UI
        working-directory: apps/aisle-ui
        run: |
          npm run preview &
          echo "Waiting for UI to be ready..."
          for i in {1..30}; do
            curl -sf http://localhost:4173 && echo "UI ready" && break
            sleep 2
          done

      - name: Install Playwright deps
        working-directory: tests/e2e
        run: npm ci && npx playwright install --with-deps chromium

      - name: Run Playwright tests
        working-directory: tests/e2e
        # ORACLE_PHASE0=1 enables the failure-context reporter
        # configured in tests/e2e/playwright.config.ts. On any
        # failure it emits ARIA snapshots + prompt files to
        # tests/e2e/test-results/failure-context/<id>/, which Oracle's
        # autofix detector consumes to classify locator drift. Without
        # this flag, no ARIA evidence is produced and the autofix
        # policy holds/rejects every entry at the source-unknown gate.
        run: npm test || true
        env:
          BASE_URL:      http://localhost:4173
          CI:            true
          ORACLE_PHASE0: '1'

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: tests/e2e/playwright-report/
          retention-days: 7

      # ── Oracle input artifact ───────────────────────────────────────────
      # The Oracle reusable workflow downloads ONE artifact (by name)
      # into `downloaded-results/`. Stage two things into a single
      # known-layout directory, then upload it:
      #
      #   1. Playwright JUnit XML at the artifact ROOT
      #      (Oracle's report parser scans only the top level — see
      #      src/report-parser.ts; it won't recurse into subdirs.
      #      Flatten any name conflicts by giving the file a stable
      #      `playwright-results.xml` name in case multiple XMLs are
      #      ever produced.)
      #
      #   2. Phase 0 failure-context under `test-results/failure-context/`
      #      (matches Oracle's ORACLE_FAILURE_CONTEXT_PATH wiring in
      #      the reusable workflow).
      #
      # Post-download layout in oracle-triage:
      #   downloaded-results/playwright-results.xml
      #   downloaded-results/test-results/failure-context/<id>/data.json
      #   downloaded-results/test-results/failure-context/<id>/prompt.md
      - name: Stage Oracle input layout
        if: always()
        run: |
          mkdir -p oracle-input/test-results/failure-context
          # Copy the Playwright JUnit XML to the artifact root. Use
          # a stable name so the parser doesn't care whether
          # Playwright writes a single file or many.
          if [ -f tests/e2e/playwright-results/results.xml ]; then
            cp tests/e2e/playwright-results/results.xml oracle-input/playwright-results.xml
          fi
          # Copy the Phase 0 failure-context tree if present.
          # `cp -r src/. dest/` copies CONTENTS so the artifact root
          # matches Oracle's expected layout. `|| true` keeps the
          # step green when the source dir is absent (e.g. zero
          # Playwright failures → reporter never wrote anything).
          cp -r tests/e2e/test-results/failure-context/. oracle-input/test-results/failure-context/ 2>/dev/null || true
          echo "Staged Oracle input:"
          find oracle-input -maxdepth 3 -type f | head -20

      - name: Upload Oracle input artifact (Playwright results + failure context)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: oracle-playwright-input
          # Trailing slash means upload the CONTENTS of oracle-input/,
          # so the artifact root contains playwright-results/ and
          # test-results/ directly.
          path: oracle-input/
          retention-days: 7
          if-no-files-found: warn

  # Stage 3: AI Oracle Triage
  #
  # Triages the Playwright suite (NOT the JUnit API tests). Reasons:
  #
  #   1. Autofix=auto only produces approvals when the locator-drift
  #      classifier has ARIA snapshot evidence. The Phase 0 reporter
  #      writes that evidence for Playwright; JUnit REST-Assured
  #      tests don't have an ARIA layer.
  #   2. Both suites emit JUnit XML, so Oracle's parser handles
  #      either format identically — the report-format input below
  #      is unchanged.
  #
  # Topology: aisle-checker is monorepo_e2e (default). The Phase 4+
  # cross-repo deploy-correlation relaxation only applies to
  # split_e2e topologies — not relevant here. The normal
  # `topologyAllowsAuto=true` gate covers monorepo+full.
  #
  # Allowlist: ${{ github.repository_id }} is the numeric repo ID.
  # The reusable workflow sets ORACLE_REPO_ID to the same value, so
  # the allowlist's strict equality match succeeds.
  oracle-triage:
    name: AI Oracle Triage
    needs: [api-tests, e2e-tests]
    if: always() && github.event_name == 'push' && github.repository == 'Ravikaniyawala/aisle-checker-api-tests-ai-triage'
    permissions:
      pull-requests: write
      contents: read
    uses: Ravikaniyawala/ai-oracle-test-failure-triage/.github/workflows/oracle-triage.yml@main
    with:
      report-path: playwright-results
      report-artifact-name: oracle-playwright-input
      report-format: JUNIT_XML
      pipeline-id: ${{ github.run_id }}
      # ── Phase 1+ autofix ────────────────────────────────────────────
      autofix-mode: auto
      autofix-auto-approved-repos: ${{ github.repository_id }}
    secrets:
      anthropic-api-key: ${{ secrets.ANTHROPIC_API_KEY }}
      atlassian-token: ${{ secrets.ATLASSIAN_TOKEN }}
      atlassian-email: ${{ secrets.ATLASSIAN_EMAIL }}
      atlassian-base-url: ${{ secrets.ATLASSIAN_BASE_URL }}
      atlassian-project-key: ${{ secrets.ATLASSIAN_PROJECT_KEY }}
      slack-webhook-url: ${{ secrets.SLACK_WEBHOOK_URL }}

  # Stage 3b: TestHealer (Phase 1 — dry-run only).
  #
  # Consumes oracle-triage's autofix queue + failure-context
  # artifacts. For every approved heal candidate, asks Claude for
  # a unified diff that would fix the failing test, and posts a
  # sticky comment to the originating PR with the proposed diffs.
  # No side effects: no branches, no PRs, no state mutation.
  #
  # Gated on `autofix-queue-approved != '0'` so the job only runs
  # when there's something to heal. Saves CI minutes on the green
  # path. `always()` lets the healer run even if a sibling job
  # (deploy-blocked) failed — healing doesn't gate deployment.
  #
  # Runs in parallel with the deploy / deploy-blocked jobs.
  #
  # Design: docs/test-healer-design.md in the Oracle repo.
  test-healer:
    name: TestHealer (Phase 1 dry-run)
    needs: oracle-triage
    if: |
      always() &&
      needs.oracle-triage.result == 'success' &&
      needs.oracle-triage.outputs.autofix-queue-approved != '0'
    # The reusable workflow declares pull-requests: write on its
    # `heal` job (to post the sticky comment). A reusable workflow
    # cannot exceed the caller's effective GITHUB_TOKEN scope —
    # if the calling job omits `permissions:`, the default for this
    # repo is read-only, the requested write scope can't be granted,
    # and the workflow fails at evaluation time with `startup_failure`
    # (no jobs ever start). Grant the same minimum permissions the
    # callee requests so workflow evaluation succeeds. Mirrors the
    # `oracle-triage` calling job above.
    permissions:
      contents: read
      pull-requests: write
    uses: Ravikaniyawala/ai-oracle-test-failure-triage/.github/workflows/test-healer.yml@main
    secrets:
      anthropic-api-key: ${{ secrets.ANTHROPIC_API_KEY }}

  # Stage 4a: Deploy (only when Oracle succeeded AND verdict is CLEAR)
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: oracle-triage
    if: |
      always() &&
      needs.oracle-triage.result == 'success' &&
      needs.oracle-triage.outputs.verdict == 'CLEAR'
    steps:
      - uses: actions/checkout@v4
      - name: Deploy application
        run: |
          echo "Oracle verdict: CLEAR"
          echo "No REGRESSION or NEW_BUG — proceeding with deploy"

  # Stage 4b: Block deploy (REGRESSION/NEW_BUG found, OR oracle itself failed)
  deploy-blocked:
    name: Deploy Blocked
    runs-on: ubuntu-latest
    needs: oracle-triage
    if: |
      always() &&
      (needs.oracle-triage.result != 'success' ||
       needs.oracle-triage.outputs.verdict == 'BLOCKED')
    steps:
      - name: Block deployment
        run: |
          echo "================================================"
          echo "DEPLOY BLOCKED BY AI ORACLE"
          if [ "${{ needs.oracle-triage.result }}" != "success" ]; then
            echo "Reason: Oracle triage job failed — deploy blocked as a safety measure."
          else
            echo "Reason: REGRESSION or NEW_BUG found in test results."
          fi
          echo "Review the Oracle summary in the Actions tab"
          echo "or check Slack for the triage report."
          echo "================================================"
          exit 1
