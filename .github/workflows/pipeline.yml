name: Aisle Checker Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:

  # Stage 1: Build
  build:
    name: Build API
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build API (skip tests)
        run: mvn package -DskipTests -q
        working-directory: apps/aisle-api

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: aisle-api-jar
          path: apps/aisle-api/target/*.jar
          retention-days: 1

  # Stage 2: API Tests
  api-tests:
    name: REST Assured API Tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Download JAR
        uses: actions/download-artifact@v4
        with:
          name: aisle-api-jar
          path: apps/aisle-api/target/

      - name: Start API server
        run: |
          java -jar apps/aisle-api/target/*.jar &
          echo "Waiting for API to be ready..."
          for i in {1..30}; do
            curl -sf http://localhost:8080/api/products && echo "API ready" && break
            sleep 2
          done

      - name: Run REST Assured tests
        # || true — let all tests run even if some fail, Oracle handles triage
        run: mvn test -Dapi.base.url=http://localhost:8080 -q || true
        working-directory: tests/api

      - name: Collect surefire reports
        if: always()
        run: |
          mkdir -p test-results
          cp tests/api/target/surefire-reports/*.xml test-results/ 2>/dev/null || true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/
          retention-days: 7

  # Stage 3: AI Oracle Triage
  oracle-triage:
    name: AI Oracle Triage
    needs: api-tests
    if: always()
    uses: Ravikaniyawala/ai-oracle-triage/.github/workflows/oracle-triage.yml@main
    with:
      report-path: test-results
      report-artifact-name: test-results
      pipeline-id: ${{ github.run_id }}
    secrets:
      anthropic-api-key: ${{ secrets.ANTHROPIC_API_KEY }}
      atlassian-token: ${{ secrets.ATLASSIAN_TOKEN }}
      atlassian-base-url: ${{ secrets.ATLASSIAN_BASE_URL }}
      atlassian-project-key: ${{ secrets.ATLASSIAN_PROJECT_KEY }}
      slack-webhook-url: ${{ secrets.SLACK_WEBHOOK_URL }}

  # Stage 4a: Deploy (when Oracle clears)
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: oracle-triage
    if: |
      always() &&
      needs.oracle-triage.outputs.verdict == 'CLEAR'
    steps:
      - uses: actions/checkout@v4
      - name: Deploy application
        run: |
          echo "Oracle verdict: CLEAR"
          echo "No REGRESSION or NEW_BUG — proceeding with deploy"

  # Stage 4b: Block deploy (when Oracle finds REGRESSION or NEW_BUG)
  deploy-blocked:
    name: Deploy Blocked
    runs-on: ubuntu-latest
    needs: oracle-triage
    if: |
      always() &&
      needs.oracle-triage.outputs.verdict == 'BLOCKED'
    steps:
      - name: Block deployment
        run: |
          echo "================================================"
          echo "DEPLOY BLOCKED BY AI ORACLE"
          echo "REGRESSION or NEW_BUG found in test results."
          echo "Review the Oracle summary in the Actions tab"
          echo "or check Slack for the triage report."
          echo "================================================"
          exit 1
